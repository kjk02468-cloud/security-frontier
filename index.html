<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>안보 프론티어 — Security Frontier</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/1.119.0/iconfont/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#04080f;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;color:#e8e0cc;-webkit-tap-highlight-color:transparent;overflow:hidden}
#app{height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#04080f}
.screen{width:100%;max-width:420px;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden;box-sizing:border-box}

/* ── BATTLE SCENE ── */
#battle-wrap{position:relative;flex-shrink:0;height:168px;overflow:hidden;background:linear-gradient(180deg,#04080f 0%,#08122a 60%,#0a1830 100%)}
.stars{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle var(--d,2s) ease-in-out infinite var(--dl,0s)}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:.9}}
.ground{position:absolute;bottom:0;left:0;right:0;height:28px;background:#0c1a10;border-top:1.5px solid #1a3020}
.ground-line{position:absolute;bottom:0;left:0;right:0;height:3px;background:#c8a84b22}

/* Characters */
.char-wrap{position:absolute;bottom:18px;display:flex;flex-direction:column;align-items:center;width:90px}
#player-wrap{left:10%}
#enemy-wrap{right:10%}
.char-name{font-size:9px;color:#6888a8;margin-top:4px;letter-spacing:1px;text-align:center}
.hp-mini{display:flex;gap:3px;margin-top:4px}
.heart{font-size:10px;transition:filter 0.3s}
.heart.lost{filter:grayscale(1);opacity:0.3}

/* Character animations */
.char-idle{animation:float 2.5s ease-in-out infinite}
.char-attack{animation:attack .55s cubic-bezier(0.3,0,0.7,1) forwards}
.char-hit{animation:player-hit .4s ease-out forwards}
.char-victory{animation:victory 1s ease-in-out infinite}
.enemy-idle{animation:float 2.8s ease-in-out infinite .4s}
.enemy-hit{animation:enemy-hit .5s ease-out forwards}
.enemy-defeat{animation:enemy-defeat .8s ease-out forwards}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes attack{0%{transform:translateX(0) scaleX(1)}30%{transform:translateX(55px) scaleX(1.1)}65%{transform:translateX(25px) scaleX(1)}100%{transform:translateX(0) scaleX(1)}}
@keyframes player-hit{0%,100%{transform:translateX(0)}20%{transform:translateX(-22px)}40%{transform:translateX(-10px)}70%{transform:translateX(-16px)}}
@keyframes enemy-hit{0%{transform:translateX(0) scaleX(1)}20%{transform:translateX(28px) scaleX(.85);filter:brightness(4)}50%{transform:translateX(12px);filter:brightness(2)}80%{transform:translateX(20px)}100%{transform:translateX(0) scaleX(1);filter:brightness(1)}}
@keyframes enemy-defeat{0%{transform:translateY(0) rotate(0);opacity:1}60%{transform:translateY(10px) rotate(25deg);opacity:.7}100%{transform:translateY(40px) rotate(40deg);opacity:0}}
@keyframes victory{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-18px) rotate(8deg)}75%{transform:translateY(-18px) rotate(-8deg)}}

/* Battle effects */
#effects{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
.flash-correct{animation:flash-g .5s ease-out forwards}
.flash-wrong{animation:flash-r .4s ease-out forwards}
@keyframes flash-g{0%{background:#4ade8044}100%{background:transparent}}
@keyframes flash-r{0%{background:#f8717144}100%{background:transparent}}
.impact{position:absolute;border-radius:50%;animation:impact .4s ease-out forwards}
@keyframes impact{0%{transform:scale(0);opacity:1}100%{transform:scale(2.5);opacity:0}}
.hit-text{position:absolute;font-size:24px;font-weight:900;animation:hit-text .8s ease-out forwards;pointer-events:none;text-shadow:0 2px 8px #00000088}
@keyframes hit-text{0%{transform:scale(0) rotate(-10deg);opacity:1}50%{transform:scale(1.4) rotate(5deg);opacity:1}100%{transform:scale(1) translateY(-30px);opacity:0}}
.particle{position:absolute;border-radius:50%;animation:particle .7s ease-out forwards}
@keyframes particle{0%{transform:translate(0,0);opacity:1}100%{transform:translate(var(--px),var(--py));opacity:0}}
.speed-line{position:absolute;background:linear-gradient(90deg,transparent,#ffffff22,transparent);animation:speed .3s ease-out forwards}
@keyframes speed{0%{transform:scaleX(0);opacity:.8}100%{transform:scaleX(1);opacity:0}}

/* Dialogue bubble */
.dialogue{position:absolute;background:#0d1e35;border:1.5px solid #c8a84b;border-radius:10px;padding:6px 10px;font-size:11px;color:#ddd0a8;max-width:130px;line-height:1.4;animation:bubble-in .25s ease-out;z-index:20}
.dialogue::after{content:'';position:absolute;bottom:-8px;width:0;height:0;border:4px solid transparent}
.dialogue-left{left:10px;top:20px}
.dialogue-left::after{left:16px;border-top-color:#c8a84b}
.dialogue-right{right:10px;top:20px}
.dialogue-right::after{right:16px;border-top-color:#c8a84b}
@keyframes bubble-in{from{transform:scale(0.7);opacity:0}to{transform:scale(1);opacity:1}}

/* ── GAME UI ── */
#game-ui{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 14px calc(env(safe-area-inset-bottom,0px) + 56px);display:flex;flex-direction:column;gap:0;background:#080e1c}
.status-bar{background:#04080f;padding:7px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;border-bottom:0.5px solid #1a2e50}
.gauge-bar{background:#0d1630;border-radius:4px;height:7px;overflow:hidden;border:0.5px solid #1a2e50}
.gauge-fill{height:100%;border-radius:4px;transition:width .6s ease}
.progress-bar{display:flex;gap:3px;margin-bottom:10px}
.prog-seg{flex:1;height:4px;border-radius:2px;transition:background .3s}
.round-header{display:flex;align-items:center;gap:10px;background:#0d1630;border-radius:9px;padding:8px 10px;border:0.5px solid #1a2e50;margin-bottom:8px}
.rh-icon{background:#1a2a40;border-radius:7px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.situation{background:#0c1828;border-radius:8px;padding:6px 8px;border:0.5px solid #1a2e50;margin-bottom:8px}
.answer-btn{background:#0d1630;border:1px solid #1a2e50;border-radius:8px;padding:9px 11px;font-size:12px;width:100%;margin-bottom:6px;text-align:left;color:#e8e0cc;line-height:1.55;display:flex;gap:9px;align-items:flex-start;font-family:inherit;cursor:pointer;transition:background .15s,border-color .15s}
.answer-btn:active{background:#111e3a;border-color:#c8a84b}
.label{background:#1a2a45;color:#c8a84b;border-radius:4px;padding:2px 6px;font-size:10px;flex-shrink:0;margin-top:1px;font-weight:700}
.card{background:#0d1630;border-radius:10px;border:0.5px solid #1a2e50;padding:14px;margin-bottom:10px}
.btn-gold{background:#c8a84b;color:#04080f;font-size:15px;font-weight:700;padding:14px;width:100%;border:none;border-radius:10px;font-family:inherit;cursor:pointer}
.btn-ghost{background:transparent;color:#4a6585;border:0.5px solid #1a2e50;font-size:13px;padding:11px;width:100%;border-radius:10px;font-family:inherit;cursor:pointer}
input{background:#0d1630;border:1px solid #1a2e50;border-radius:10px;padding:14px 16px;color:#e8e0cc;font-size:16px;width:100%;outline:none;font-family:inherit}
input:focus{border-color:#c8a84b}
.separator{border:none;border-top:0.5px solid #1a2e50;margin:10px 0}

/* Screen transitions */
.fade-in{animation:fadein .25s ease-out}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Outro animations */
@keyframes drop-in{0%{transform:translateY(-40px);opacity:0}70%{transform:translateY(4px)}100%{transform:translateY(0);opacity:1}}
@keyframes glow-pulse{0%,100%{filter:drop-shadow(0 0 4px #c8a84b44)}50%{filter:drop-shadow(0 0 14px #c8a84b)}}

@keyframes tracer{0%{transform:translateX(0);opacity:0}6%{opacity:1}88%{opacity:1}100%{transform:translateX(195px);opacity:0}}
@keyframes mine-blast{0%{transform:scale(0) rotate(0deg);opacity:1}35%{transform:scale(1.4) rotate(12deg);opacity:1}75%{transform:scale(2.2) rotate(28deg);opacity:.5}100%{transform:scale(3) rotate(45deg);opacity:0}}
@keyframes muzzle{0%,100%{opacity:0;transform:scale(.4)}30%,70%{opacity:1;transform:scale(1.1)}}
@keyframes mg-shake{0%,100%{transform:translateX(0) translateY(0)}10%{transform:translateX(-3px) translateY(1px)}20%{transform:translateX(3px) translateY(-1px)}30%{transform:translateX(-2px) translateY(2px)}40%{transform:translateX(3px) translateY(-1px)}50%{transform:translateX(-3px) translateY(1px)}60%{transform:translateX(2px) translateY(-2px)}70%{transform:translateX(-2px) translateY(1px)}80%{transform:translateX(2px) translateY(0)}90%{transform:translateX(-1px) translateY(1px)}}
@keyframes smoke{0%{transform:scale(0) translateY(0);opacity:.6}100%{transform:scale(2) translateY(-30px);opacity:0}}
</style>
</head>

      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='square';o.frequency.value=110+Math.random()*50;
      g.gain.setValueAtTime(0,ctx.currentTime+delay);
      g.gain.linearRampToValueAtTime(0.18,ctx.currentTime+delay+0.003);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+0.016);
      o.connect(g);g.connect(ctx.destination);
      o.start(ctx.currentTime+delay);o.stop(ctx.currentTime+delay+0.02);
    }
    setTimeout(()=>{
      try{
        const c2=new(window.AudioContext||window.webkitAudioContext)();
        const o=c2.createOscillator(),g=c2.createGain();
        o.type='sawtooth';o.frequency.setValueAtTime(200,c2.currentTime);
        o.frequency.exponentialRampToValueAtTime(30,c2.currentTime+.4);
        g.gain.setValueAtTime(.3,c2.currentTime);
        g.gain.exponentialRampToValueAtTime(.001,c2.currentTime+.5);
        o.connect(g);g.connect(c2.destination);o.start();o.stop(c2.currentTime+.5);
      }catch(e){}
    },480);
  }catch(e){}
}
function playSound(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const g=ctx.createGain();g.connect(ctx.destination);
    if(type==='correct'){
      [440,554,660].forEach((f,i)=>{const o=ctx.createOscillator();o.connect(g);o.frequency.value=f;g.gain.setValueAtTime(0.2,ctx.currentTime+i*.1);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*.1+.3);o.start(ctx.currentTime+i*.1);o.stop(ctx.currentTime+i*.1+.3);});
    }else if(type==='wrong'){
      const o=ctx.createOscillator();o.type='sawtooth';o.connect(g);o.frequency.setValueAtTime(180,ctx.currentTime);o.frequency.linearRampToValueAtTime(80,ctx.currentTime+.3);g.gain.setValueAtTime(0.15,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+.35);o.start();o.stop(ctx.currentTime+.35);
    }else if(type==='impact'){
      const o=ctx.createOscillator();o.type='square';o.connect(g);o.frequency.setValueAtTime(300,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(50,ctx.currentTime+.12);g.gain.setValueAtTime(0.25,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+.15);o.start();o.stop(ctx.currentTime+.15);
    }else if(type==='victory'){
      [523,659,784,1047].forEach((f,i)=>{const o=ctx.createOscillator();o.connect(g);o.frequency.value=f;g.gain.setValueAtTime(0.2,ctx.currentTime+i*.12);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*.12+.4);o.start(ctx.currentTime+i*.12);o.stop(ctx.currentTime+i*.12+.4);});
    }
  }catch(e){}
}

  blasts.forEach((b,i)=>{

      ex.style.cssText='position:absolute;right:'+b.r+'%;top:'+b.t+'%;width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:radial-gradient(circle,#ffffff 0%,#ffdd00 30%,#ff6600 60%,transparent 100%);animation:mine-blast .55s ease-out forwards;z-index:22;margin-right:-'+(sz/2)+'px;margin-top:-'+(sz/2)+'px;pointer-events:none';
      ef.appendChild(ex);
      const sm=document.createElement('div');

</div>`;}

async function handleAnswer(i){
  const r=ROUNDS[S.roundIdx];
  if(S.roundState!=='question')return;
  S.gauge=r.gt;
  if(i===r.correct){
    playSound('correct');
    showDialogue(r.dialogue_correct,'left');
    await animateAttack();
    S.roundState='correct';
    render();startTimer();
  }else{
    playSound('wrong');
    showDialogue(r.dialogue_wrong,'left');
    S.penalties++;
    S.startTime-=30000;
    S.playerHP=Math.max(0,S.playerHP-1);
    await animateHit();
    S.roundState='wrong';
    render();startTimer();
  }
}

function nextRound(){
  const next=S.roundIdx+1;
  if(next>=ROUNDS.length){S.finalTime=Date.now()-S.startTime;S.elapsed=S.finalTime;go('outro');}
  else{S.roundIdx=next;S.roundState='question';render();}
}

function outroHTML(){
  const pen=S.penalties,correct=6-pen,ft=S.finalTime||0;
  const penColor=pen>0?'#f87171':'#4ade80';
  const grade=ft<90000?'S급 — 완벽':ft<150000?'A급 — 우수':ft<240000?'B급 — 양호':'C급 — 분발';
  const gradeColor=ft<90000?'#4ade80':ft<150000?'#c8a84b':ft<240000?'#f0a030':'#f87171';
  return`
<div class="screen fade-in" style="align-items:center;justify-content:center;background:#04080f;padding:24px 16px;text-align:center;overflow-y:auto">
  <div style="animation:drop-in .6s cubic-bezier(0.2,0.8,0.3,1.2) both">
    <div style="width:90px;height:90px;background:#0d1a30;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;border:1.5px solid #c8a84b44;animation:glow-pulse 2s ease-in-out infinite">
      <i class="ti ti-trophy" style="font-size:48px;color:#c8a84b"></i>
    </div>
    <div style="color:#c8a84b;font-size:9px;letter-spacing:4px;margin-bottom:8px">설득도 100% 달성</div>
    <h2 style="color:#e8e0cc;font-size:22px;font-weight:700;margin:0 0 4px">검증 완료</h2>
    <p style="color:#4a6585;font-size:12px;margin:0 0 24px;line-height:1.7">${S.name} 위원님의 날카로운 검증 덕분에<br>육군의 논리가 더욱 견고해졌습니다</p>
  </div>
  <div style="background:#0d1630;border-radius:16px;padding:22px;width:100%;margin-bottom:14px;border:0.5px solid #1a2e50">
    <div style="color:#4a6585;font-size:11px;margin-bottom:6px">완주 기록</div>
    <div style="color:#c8a84b;font-size:44px;font-weight:700;font-family:monospace;letter-spacing:2px;margin-bottom:4px">${fmt(ft)}</div>
    <div style="color:#4a6585;font-size:10px;margin-bottom:16px">분 : 초 . 센티초</div>
    <div style="display:inline-block;background:${gradeColor}22;border:1px solid ${gradeColor}55;border-radius:8px;padding:6px 18px;margin-bottom:16px">
      <span style="color:${gradeColor};font-size:14px;font-weight:700">${grade}</span>
    </div>
    <div class="separator"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div style="background:#060c1a;border-radius:8px;padding:12px">
        <div style="color:${penColor};font-size:20px;font-weight:700">${pen}회</div>
        <div style="color:#4a6585;font-size:10px;margin-top:3px">오답 패널티</div>
      </div>
      <div style="background:#060c1a;border-radius:8px;padding:12px">
        <div style="color:#c8a84b;font-size:20px;font-weight:700">${correct}/6</div>
        <div style="color:#4a6585;font-size:10px;margin-top:3px">정답</div>
      </div>
    </div>
  </div>
  <div style="background:#0a1a10;border-radius:12px;border:1.5px solid #4ade8044;padding:14px;width:100%;margin-bottom:16px">
    <div style="color:#4ade80;font-size:11px;font-weight:700;margin-bottom:6px">
      <i class="ti ti-device-mobile" style="font-size:13px"></i> 이 화면을 발표자에게 보여주세요
    </div>
    <div style="color:#70b880;font-size:11px;line-height:1.65">최단 시간 완주자에게 텀블러가 수여됩니다</div>
  </div>
  <button class="btn-ghost" style="width:100%" onclick="S={screen:'title',name:'',roundIdx:0,roundState:'question',gauge:0,penalties:0,startTime:null,elapsed:0,finalTime:null,playerHP:3};render()">처음으로</button>
</div>`;}

function go(s){S.screen=s;render();}

render();
</script>
</body>
</html>
